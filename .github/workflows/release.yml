name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset: easy_terminal-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: easy_terminal-darwin-arm64
          - goos: linux
            goarch: amd64
            asset: easy_terminal-linux-amd64
          - goos: linux
            goarch: arm64
            asset: easy_terminal-linux-arm64
          - goos: windows
            goarch: amd64
            asset: easy_terminal-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.asset }} ./cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  publish-github-release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-npm:
    name: publish npm
    needs: publish-github-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Check package version
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          test "$PACKAGE_VERSION" = "${GITHUB_REF_NAME}"
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
